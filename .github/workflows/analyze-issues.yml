name: Issue Analysis

on:
  issues:
    types: [labeled]

jobs:
  analyze:
    if: github.event.label.name == 'analysis_todo'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    concurrency:
      group: analyze-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      issues: write
      contents: write
      packages: read

    steps:
      - name: Validate required secrets
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
        run: |
          missing=()
          [[ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]] && missing+=(CLAUDE_CODE_OAUTH_TOKEN)
          [[ -z "$CODEX_AUTH_JSON_B64" ]] && missing+=(CODEX_AUTH_JSON_B64)
          if [[ ${#missing[@]} -gt 0 ]]; then
            for s in "${missing[@]}"; do
              echo "::error::Secret $s is not configured. Add it to Settings → Environments → dev → Secrets."
            done
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run issue analysis
        env:
          PLATFORM: github
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          ISSUE_ID: ${{ github.event.issue.number }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          ANALYST_MODEL: claude-sonnet-4-6
          REVIEWER_MODEL: gpt-5.5
        run: |
          docker run --rm \
            -e PLATFORM \
            -e GITHUB_TOKEN \
            -e GITHUB_OWNER \
            -e GITHUB_REPO \
            -e ISSUE_ID \
            -e CLAUDE_CODE_OAUTH_TOKEN \
            -e CODEX_AUTH_JSON_B64 \
            -e ANALYST_MODEL \
            -e REVIEWER_MODEL \
            ghcr.io/${{ github.repository }}:main
